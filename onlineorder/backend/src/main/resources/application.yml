spring:
  application:
    name: onlineorder
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:onlineorder}
    username: ${DATABASE_USERNAME:onlineorder}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DATABASE_POOL_SIZE:10}
      minimum-idle: 1
      connection-timeout: 30000
  sql:
    init:
      mode: ${INIT_DB:always}
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  jackson:
    default-property-inclusion: non_null
    property-naming-strategy: SNAKE_CASE
  cache:
    cache-names: restaurants,menus,carts
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework.security: INFO
